<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conociendo a Mi chinita 💙</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary-blue: #4a90e2;
    --soft-blue: #7bb3f0;
    --light-blue: #e8f1f8;
    --accent-gold: #d4af37;
    --white: #ffffff;
    --dark: #1a1a2e;
    --pink: #f4d4e6;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, var(--light-blue) 0%, #f0e6ff 100%);
    color: var(--dark);
    overflow-x: hidden;
    min-height: 100vh;
}

/* ===== LOGIN ===== */
.login-screen {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    background: linear-gradient(135deg, var(--primary-blue), var(--soft-blue));
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    flex-direction: column;
}

.login-screen.hidden {
    display: none;
}

.login-container {
    background: white;
    padding: 60px 40px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    max-width: 400px;
    width: 90%;
    text-align: center;
    animation: slideUp 0.8s ease-out;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

.login-title {
    font-family: 'Great Vibes', cursive;
    font-size: 3rem;
    color: var(--primary-blue);
    margin-bottom: 10px;
}

.login-subtitle {
    font-size: 1.1rem;
    color: #666;
    margin-bottom: 30px;
}

.login-input {
    width: 100%;
    padding: 15px;
    margin-bottom: 20px;
    border: 2px solid var(--soft-blue);
    border-radius: 10px;
    font-size: 1rem;
    font-family: 'Poppins', sans-serif;
    transition: all 0.3s ease;
}

.login-input:focus {
    outline: none;
    border-color: var(--primary-blue);
    box-shadow: 0 0 10px rgba(74, 144, 226, 0.3);
}

.login-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--primary-blue), var(--soft-blue));
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
}

.login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(74, 144, 226, 0.3);
}

.login-error {
    color: #e74c3c;
    margin-bottom: 15px;
    display: none;
}

/* ===== MAIN SCREEN ===== */
.container {
    max-width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.header {
    text-align: center;
    padding: 40px 20px;
    background: linear-gradient(135deg, var(--primary-blue), var(--soft-blue));
    color: white;
    position: relative;
    overflow: hidden;
}

.header::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: moveBackground 20s linear infinite;
}

@keyframes moveBackground {
    0% { transform: translate(0, 0); }
    100% { transform: translate(50px, 50px); }
}

.header-content {
    position: relative;
    z-index: 1;
}

.header h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 3rem;
    margin-bottom: 5px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    animation: slideDown 0.8s ease-out;
}

.header-subtitle {
    font-size: 1.2rem;
    font-weight: 300;
    animation: fadeIn 1s ease-out;
}

@keyframes slideDown {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.mode-selector {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 20px;
    flex-wrap: wrap;
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid var(--soft-blue);
}

.mode-btn {
    padding: 12px 25px;
    font-size: 1rem;
    font-weight: 600;
    border: 2px solid var(--primary-blue);
    background: white;
    color: var(--primary-blue);
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.mode-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(74, 144, 226, 0.3);
}

.mode-btn.active {
    background: var(--primary-blue);
    color: white;
    box-shadow: 0 8px 20px rgba(74, 144, 226, 0.4);
}

.logout-btn {
    padding: 8px 15px;
    background: rgba(255,255,255,0.2);
    color: white;
    border: 1px solid white;
    border-radius: 15px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.3s ease;
    margin-left: auto;
    margin-right: 20px;
}

.logout-btn:hover {
    background: rgba(255,255,255,0.3);
}

.content {
    flex: 1;
    padding: 30px 20px;
}

.mode {
    display: none;
    animation: fadeIn 0.6s ease-out;
}

.mode.active {
    display: block;
}

/* ===== MODO CARTAS ===== */
.letter-container {
    max-width: 700px;
    margin: 0 auto;
}

.letter-tabs {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
}

.letter-tab-btn {
    padding: 10px 20px;
    background: white;
    border: 2px solid var(--soft-blue);
    color: var(--primary-blue);
    border-radius: 20px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s ease;
}

.letter-tab-btn.active {
    background: var(--primary-blue);
    color: white;
}

.letter-tab-btn:hover {
    transform: translateY(-2px);
}

.letter {
    background: white;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 10px 40px rgba(74, 144, 226, 0.15);
    border-left: 5px solid var(--primary-blue);
    display: none;
    animation: slideInRight 0.6s ease-out;
}

@keyframes slideInRight {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
}

.letter.active {
    display: block;
}

.letter h3 {
    color: var(--primary-blue);
    margin-bottom: 20px;
    font-size: 1.8rem;
    font-family: 'Great Vibes', cursive;
}

.letter p {
    line-height: 1.8;
    color: #333;
    margin-bottom: 15px;
    font-size: 1.05rem;
    text-align: justify;
}

/* ===== MODO JUEGO ===== */
.game-container {
    max-width: 700px;
    margin: 0 auto;
}

.game-card {
    background: white;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 10px 40px rgba(74, 144, 226, 0.15);
    margin-bottom: 20px;
}

.game-title {
    color: var(--primary-blue);
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    margin-bottom: 20px;
    text-align: center;
}

.game-instructions {
    background: var(--light-blue);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
    color: #333;
}

.game-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 20px;
}

.game-option {
    padding: 20px;
    background: var(--light-blue);
    border: 2px solid var(--soft-blue);
    border-radius: 15px;
    cursor: pointer;
    text-align: center;
    font-weight: 600;
    transition: all 0.3s ease;
}

.game-option:hover {
    background: var(--primary-blue);
    color: white;
    transform: scale(1.05);
}

.game-option.selected {
    background: var(--primary-blue);
    color: white;
}

.game-result {
    display: none;
    background: linear-gradient(135deg, rgba(74, 144, 226, 0.1), rgba(123, 179, 240, 0.1));
    padding: 30px;
    border-radius: 15px;
    border-left: 5px solid var(--primary-blue);
    animation: slideUp 0.6s ease-out;
}

.game-result.active {
    display: block;
}

.result-text {
    color: var(--primary-blue);
    font-weight: 600;
    font-size: 1.1rem;
    margin-bottom: 15px;
}

.result-content {
    background: white;
    padding: 20px;
    border-radius: 10px;
    color: #333;
    line-height: 1.8;
}

/* ===== GALERÍA ===== */
.gallery-container {
    max-width: 700px;
    margin: 0 auto;
}

.gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 30px;
}

.gallery-item {
    position: relative;
    overflow: hidden;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(74, 144, 226, 0.2);
    cursor: pointer;
    transition: transform 0.3s ease;
}

.gallery-item:hover {
    transform: scale(1.05);
}

.gallery-item img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.8);
}

.modal-content {
    margin: auto;
    width: 90%;
    max-width: 600px;
    max-height: 90vh;
    top: 50%;
    left: 50%;
    position: absolute;
    transform: translate(-50%, -50%);
    border-radius: 15px;
}

.close-modal {
    position: absolute;
    top: 20px;
    right: 35px;
    color: white;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
    z-index: 1001;
}

/* ===== MODO FE ===== */
.faith-container {
    max-width: 700px;
    margin: 0 auto;
}

.faith-card {
    background: white;
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 20px;
    border-top: 4px solid var(--primary-blue);
    box-shadow: 0 5px 20px rgba(74, 144, 226, 0.1);
}

.scripture-text {
    font-style: italic;
    color: #333;
    margin: 15px 0;
    line-height: 1.8;
}

.verse-ref {
    color: var(--primary-blue);
    font-weight: 600;
    margin-bottom: 10px;
}

.faith-title {
    color: var(--primary-blue);
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    margin-bottom: 20px;
    text-align: center;
}

/* ===== MODO DESCUBRE ===== */
.discovery-container {
    max-width: 700px;
    margin: 0 auto;
}

.discovery-card {
    background: white;
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 20px;
    box-shadow: 0 10px 40px rgba(74, 144, 226, 0.15);
    border-left: 5px solid var(--primary-blue);
}

.discovery-title {
    color: var(--primary-blue);
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    margin-bottom: 15px;
}

.discovery-text {
    color: #333;
    line-height: 1.8;
    margin-bottom: 15px;
}

.button-group {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 20px;
}

.btn {
    padding: 12px 30px;
    border: none;
    border-radius: 25px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-primary {
    background: var(--primary-blue);
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(74, 144, 226, 0.3);
}

.footer {
    text-align: center;
    padding: 30px 20px;
    background: rgba(74, 144, 226, 0.1);
    color: var(--primary-blue);
    border-top: 2px solid var(--soft-blue);
}

/* ===== ANIMACIONES ===== */
@keyframes float {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-100vh) scale(0); opacity: 0; }
}

@media (max-width: 768px) {
    .header h1 {
        font-size: 2.2rem;
    }

    .letter {
        padding: 25px 20px;
    }

    .game-options {
        grid-template-columns: 1fr;
    }

    .gallery-grid {
        grid-template-columns: 1fr;
    }

    .mode-btn {
        padding: 10px 15px;
        font-size: 0.85rem;
    }
}

/* ============================================ */
/* GALERÍA CIRCULAR + EFECTO ESPEJO             */
/* ============================================ */

.gallery-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0 10px;
}

.gallery-heading {
    font-family: 'Playfair Display', 'Georgia', serif;
    font-size: 2rem;
    color: var(--primary-blue);
    margin-bottom: 6px;
    text-align: center;
}

.gallery-hint {
    color: #888;
    font-size: 0.95rem;
    margin-bottom: 30px;
    text-align: center;
}

/* --- Anillo orbitante --- */
.orbit-ring {
    position: relative;
    width: 320px;
    height: 320px;
    margin: 0 auto 30px;
    animation: spinRing 18s linear infinite;
}

@keyframes spinRing {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}

.orbit-item {
    position: absolute;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    overflow: hidden;
    cursor: pointer;
    /* Colocar en círculo */
    top:  50%;
    left: 50%;
    transform:
        rotate(calc(360deg / var(--total) * var(--i)))
        translateY(-130px)
        rotate(calc(-360deg / var(--total) * var(--i)));
    margin-top: -45px;
    margin-left: -45px;
    box-shadow: 0 4px 18px rgba(74,144,226,0.35);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    border: 3px solid rgba(255,255,255,0.7);
    /* Contra-rotación para que las fotos no giren con el anillo */
    animation: counterSpin 18s linear infinite;
}

@keyframes counterSpin {
    from { --cr: 0deg; }
    to   { --cr: -360deg; }
}

/* Contra-rotar la imagen individualmente */
.orbit-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(3px) brightness(0.85);
    transition: filter 0.3s ease;
    /* Contra-rotación CSS */
    animation: counterSpinImg 18s linear infinite;
    transform-origin: center center;
    pointer-events: none;
    user-select: none;
}

@keyframes counterSpinImg {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}

.orbit-item:hover img {
    filter: blur(1px) brightness(1);
}

.orbit-item:hover {
    box-shadow: 0 6px 28px rgba(74,144,226,0.6);
}

/* --- Panel inferior: foto revelada --- */
.reveal-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 0;
    overflow: hidden;
    z-index: 500;
    transition: height 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    background: linear-gradient(180deg, rgba(20,40,80,0.95) 0%, rgba(10,20,50,0.98) 100%);
    border-radius: 22px 22px 0 0;
    box-shadow: 0 -8px 40px rgba(74,144,226,0.4);
}

.reveal-panel.open {
    height: 55vh;
}

.reveal-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    padding: 16px 16px 12px;
    box-sizing: border-box;
}

.scratch-wrap {
    position: relative;
    flex: 1;
    width: 100%;
    max-width: 420px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}

.reveal-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 16px;
}

.scratch-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 16px;
    cursor: crosshair;
    touch-action: none;
}

.reveal-tip {
    color: rgba(180,210,255,0.75);
    font-size: 0.82rem;
    margin-top: 10px;
    text-align: center;
    letter-spacing: 0.03em;
}

/* Botón cerrar panel (tap fuera) */
.reveal-panel::before {
    content: '▼ cerrar';
    display: block;
    text-align: center;
    color: rgba(180,210,255,0.6);
    font-size: 0.75rem;
    padding: 6px 0 0;
    cursor: pointer;
    letter-spacing: 0.1em;
}

    </style>
</head>

// ============================================
// LOGIN.JS - Gestión de autenticación
// ============================================

function handleLoginKeypress(event) {
    if (event.key === 'Enter') {
        checkPassword();
    }
}

function checkPassword() {
    const password = document.getElementById('passwordInput').value;
    const correctPassword = 'mi tontita';
    
    if (password === correctPassword) {
        // Login exitoso
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').style.display = 'flex';
        
        // Mensaje en consola
        console.log('%c💙 KELYNETH, ESTOS SON MIS VERDADEROS SENTIMIENTOS 💙', 
            'font-size: 20px; color: #4a90e2; font-weight: bold;');
        console.log('%cTe estoy conociendo y me está enamorando lo que veo en ti.', 
            'font-size: 14px; color: #d4af37;');
    } else {
        // Login fallido
        showLoginError();
    }
}

function showLoginError() {
    const errorElement = document.getElementById('loginError');
    errorElement.style.display = 'block';
    document.getElementById('passwordInput').value = '';
    
    setTimeout(() => {
        errorElement.style.display = 'none';
    }, 3000);
}

function logout() {
    if (confirm('¿Estás segura de que quieres salir?')) {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('passwordInput').value = '';
    }
}

window.addEventListener('load', () => {

});

// ============================================
// MODOS.JS - Navegación entre modos
// ============================================

function switchMode(mode) {
    // Ocultar todos los modos
    const modes = document.querySelectorAll('.mode');
    modes.forEach(m => m.classList.remove('active'));
    
    // Mostrar el modo seleccionado
    document.getElementById(mode).classList.add('active');

    // Actualizar botones activos
    const buttons = document.querySelectorAll('.mode-btn');
    buttons.forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
}

function switchLetter(index) {
    // Ocultar todas las cartas
    const letters = document.querySelectorAll('.letter');
    letters.forEach(l => l.classList.remove('active'));
    
    // Mostrar carta seleccionada
    letters[index].classList.add('active');

    // Actualizar botones de tabs
    const buttons = document.querySelectorAll('.letter-tab-btn');
    buttons.forEach(b => b.classList.remove('active'));
    buttons[index].classList.add('active');
}

// ============================================
// EFECTOS.JS - Efectos visuales
// ============================================

function createHearts() {
    const container = document.body;
    const heartEmojis = ['❤️', '💕', '💖', '💗', '💘', '💝', '💙'];
    
    // Crear 25 corazones
    for (let i = 0; i < 25; i++) {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
        
        // Posición aleatoria en X
        heart.style.left = Math.random() * 100 + '%';
        heart.style.bottom = '-50px';
        
        // Tamaño aleatorio
        heart.style.fontSize = (Math.random() * 30 + 20) + 'px';
        
        // Estilos posición
        heart.style.position = 'fixed';
        heart.style.zIndex = '1';
        heart.style.pointerEvents = 'none';
        
        // Animación aleatoria
        const duration = Math.random() * 2 + 3;
        const delay = Math.random() * 0.5;
        heart.style.animation = `float ${duration}s ease-in infinite`;
        heart.style.animationDelay = delay + 's';
        
        container.appendChild(heart);

// GALERIA.JS - Galería circular con efecto espejo
// ============================================

let currentOpenImage = null;
let scratchCanvas = null;
let scratchCtx = null;
let isDrawing = false;
let revealPercent = 0;
let animFrameId = null;

// ---- Construcción del carrusel circular ----
function buildCircularGallery(container) {
  const images = [
    'assets/images/image1.jpeg',
    'assets/images/image2.jpeg',
    'assets/images/image3.jpeg',
    'assets/images/image4.jpeg',
    'assets/images/image5.jpeg',
    'assets/images/image6.jpeg',
  ];

  container.innerHTML = `
    <div class="gallery-wrapper">
      <h2 class="gallery-heading">Nuestros Momentos 📸</h2>
      <p class="gallery-hint">Toca una foto para revelarla 💙</p>
      <div class="orbit-ring" id="orbitRing"></div>
    </div>

    <!-- Panel inferior con efecto espejo -->
    <div class="reveal-panel" id="revealPanel">
      <div class="reveal-inner">
        <div class="scratch-wrap" id="scratchWrap">
          <img class="reveal-photo" id="revealPhoto" src="" alt="foto">
          <canvas class="scratch-canvas" id="scratchCanvas"></canvas>
        </div>
        <p class="reveal-tip">✨ Desliza sobre la foto para limpiar el espejo</p>
      </div>
    </div>
  `;

  const ring = container.querySelector('#orbitRing');
  const total = images.length;

  images.forEach((src, i) => {
    const item = document.createElement('div');
    item.className = 'orbit-item';
    item.style.setProperty('--i', i);
    item.style.setProperty('--total', total);

    const img = document.createElement('img');
    img.src = src;
    img.alt = `Foto ${i + 1}`;
    img.draggable = false;

    item.appendChild(img);
    item.addEventListener('click', () => openReveal(src));
    ring.appendChild(item);
  });
}

// ---- Abrir panel inferior ----
function openReveal(src) {
  const panel = document.getElementById('revealPanel');
  const photo = document.getElementById('revealPhoto');
  const canvas = document.getElementById('scratchCanvas');
  const wrap = document.getElementById('scratchWrap');

  currentOpenImage = src;
  photo.src = src;
  panel.classList.add('open');

  // Esperar a que la imagen cargue para dimensionar el canvas
  photo.onload = () => initScratch(canvas, wrap);
  if (photo.complete) initScratch(canvas, wrap);
}

// ---- Inicializar capa de "espejo empañado" ----
function initScratch(canvas, wrap) {
  const w = wrap.offsetWidth;
  const h = wrap.offsetHeight;

  canvas.width = w;
  canvas.height = h;

  scratchCanvas = canvas;
  scratchCtx = canvas.getContext('2d');
  revealPercent = 0;

  // Fondo: gradiente tipo espejo empañado
  const grad = scratchCtx.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0,   'rgba(180,210,255,0.92)');
  grad.addColorStop(0.5, 'rgba(200,220,255,0.88)');
  grad.addColorStop(1,   'rgba(160,200,255,0.92)');
  scratchCtx.fillStyle = grad;
  scratchCtx.fillRect(0, 0, w, h);

  // Texto "empañado"
  scratchCtx.fillStyle = 'rgba(255,255,255,0.55)';
  scratchCtx.font = 'bold 22px Georgia';
  scratchCtx.textAlign = 'center';
  scratchCtx.fillText('💙 Límpiame...', w / 2, h / 2);

  // Gotas de vapor
  for (let k = 0; k < 60; k++) {
    scratchCtx.beginPath();
    const rx = Math.random() * w;
    const ry = Math.random() * h;
    const rr = Math.random() * 40 + 5;
    scratchCtx.arc(rx, ry, rr, 0, Math.PI * 2);
    scratchCtx.fillStyle = `rgba(255,255,255,${Math.random() * 0.15})`;
    scratchCtx.fill();
  }

  // Eventos touch y mouse
  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', stopDraw);
  canvas.addEventListener('mouseleave', stopDraw);
  canvas.addEventListener('touchstart', startDrawT, { passive: false });
  canvas.addEventListener('touchmove', drawT, { passive: false });
  canvas.addEventListener('touchend', stopDraw);
}

function startDraw(e) { isDrawing = true; scratch(e.offsetX, e.offsetY); }
function stopDraw()   { isDrawing = false; checkFullReveal(); }

function draw(e) {
  if (!isDrawing) return;
  scratch(e.offsetX, e.offsetY);
}

function startDrawT(e) {
  e.preventDefault();
  isDrawing = true;
  const t = e.touches[0];
  const r = scratchCanvas.getBoundingClientRect();
  scratch(t.clientX - r.left, t.clientY - r.top);
}

function drawT(e) {
  e.preventDefault();
  if (!isDrawing) return;
  const t = e.touches[0];
  const r = scratchCanvas.getBoundingClientRect();
  scratch(t.clientX - r.left, t.clientY - r.top);
}

function scratch(x, y) {
  if (!scratchCtx) return;
  scratchCtx.globalCompositeOperation = 'destination-out';
  scratchCtx.beginPath();
  scratchCtx.arc(x, y, 38, 0, Math.PI * 2);
  scratchCtx.fill();
  scratchCtx.globalCompositeOperation = 'source-over';
}

// ---- Verificar si ya limpió suficiente (>65%) ----
function checkFullReveal() {
  if (!scratchCtx) return;
  const data = scratchCtx.getImageData(0, 0, scratchCanvas.width, scratchCanvas.height).data;
  let transparent = 0;
  for (let i = 3; i < data.length; i += 4) {
    if (data[i] < 30) transparent++;
  }
  const pct = transparent / (scratchCanvas.width * scratchCanvas.height);
  if (pct > 0.65) clearAllMist();
}

function clearAllMist() {
  if (!scratchCtx) return;
  scratchCtx.clearRect(0, 0, scratchCanvas.width, scratchCanvas.height);
}

// ---- Cerrar panel ----
function closeReveal() {
  const panel = document.getElementById('revealPanel');
  panel.classList.remove('open');
  currentOpenImage = null;
  if (scratchCanvas) {
    scratchCanvas.removeEventListener('mousedown', startDraw);
    scratchCanvas.removeEventListener('mousemove', draw);
    scratchCanvas.removeEventListener('mouseup', stopDraw);
    scratchCanvas.removeEventListener('mouseleave', stopDraw);
    scratchCanvas.removeEventListener('touchstart', startDrawT);
    scratchCanvas.removeEventListener('touchmove', drawT);
    scratchCanvas.removeEventListener('touchend', stopDraw);
    scratchCtx = null;
    scratchCanvas = null;
  }
}

// Cerrar panel al tocar el borde superior (::before no captura eventos, usamos click en panel fuera del inner)
document.addEventListener('DOMContentLoaded', () => {
  document.addEventListener('click', (e) => {
    const panel = document.getElementById('revealPanel');
    if (!panel) return;
    const inner = panel.querySelector('.reveal-inner');
    if (panel.classList.contains('open') && !inner.contains(e.target) && panel.contains(e.target)) {
      closeReveal();
    }
  });
});
